<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#090716">

  <title>Chest Companion</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Supabase browser library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- Eff artwork background -->
  <div class="app-background" aria-hidden="true"></div>
  <div class="app-overlay" aria-hidden="true"></div>


  <!-- ==========================================
       LOADING SCREEN
  =========================================== -->

  <section id="loadingScreen" class="loading-screen">

    <div class="loading-card glass-panel">

      <p class="eyebrow">
        CHEST COMPANION
      </p>

      <h1>
        Forged in the Crystal Nexus
      </h1>

      <p class="credit-line">
        Built by Cherubim
      </p>

      <p class="credit-line">
        Artwork by Eff
      </p>

      <div
        class="crystal-loader"
        role="status"
        aria-label="Loading Chest Companion"
      ></div>

      <p id="loadingStatus" class="muted-text">
        Connecting to the Crystal Nexus...
      </p>

    </div>

  </section>


  <!-- ==========================================
       MAIN APPLICATION
  =========================================== -->

  <div id="appShell" class="app-shell hidden">

    <!-- TOP HEADER -->

    <header class="top-bar glass-panel">

      <div>
        <p class="eyebrow">
          CHEST COMPANION
        </p>

        <h1 id="pageTitle">
          Home
        </h1>
      </div>

      <div id="cloudBadge" class="status-badge">
        Connecting...
      </div>

    </header>


    <main>

      <!-- ======================================
           HOME VIEW
      ======================================= -->

      <section id="homeView" class="view active">

        <div class="hero-card glass-panel">

          <p class="eyebrow">
            WELCOME BACK
          </p>

          <h2 id="welcomeName">
            Tester
          </h2>

          <p class="muted-text">
